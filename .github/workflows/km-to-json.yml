name: Generate JSON (and YAML) from KM file

on:
  push:
    branches: [ main ]
    paths:
      - 'model/*.km'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Generate maturity_model.json from .km file
        run: python scripts/km_to_json.py

      - name: Generate maturity_model.yaml from JSON
        run: |
          python - <<'EOF'
          import json, yaml, pathlib
          data = json.load(open("_data/maturity_model.json"))
          yaml.safe_dump(data, open("_data/maturity_model.yaml", "w"), sort_keys=False, allow_unicode=True)
          EOF

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet _data/maturity_model.json _data/maturity_model.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push generated files
        if: steps.diff.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/maturity_model.json _data/maturity_model.yaml
          git commit -m "Auto-generate JSON and YAML from KM file"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }} HEAD:${{ github.ref }}
